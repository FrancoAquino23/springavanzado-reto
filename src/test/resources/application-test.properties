# Base de datos H2 aislada para tests
spring.datasource.url=jdbc:h2:mem:testdb;DATABASE_TO_LOWER=TRUE
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true

# Deshabilitar la ejecucion del script data.sql en tests
spring.sql.init.mode=never

# Clave JWT identica a la de produccion
jwt.service.key=c13994aec64de45c03dddf6490eebeb60f3b83c4437aa0611771c88ae12ca8e7

# Reducir ruido en logs durante tests
spring.jpa.show-sql=false
spring.h2.console.enabled=false
